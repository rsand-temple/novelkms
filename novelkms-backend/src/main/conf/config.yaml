# ===========================================================================
# NovelKMS configuration
#
# Run with:   java -jar novelkms.jar server config.yaml
# Then open:  http://localhost:8080
#
# The H2 database file is created automatically next to wherever you launch
# the command from (the "./" below is relative to your current directory).
# ===========================================================================

server:
  # Mount the JAX-RS API under /api/* so the application root ("/") is free
  # for the bundled React app. The resource classes are mounted at "/", so
  # endpoints still resolve at /api/... (e.g. /api/books).
  rootPath: /api/*
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081
  requestLog:
    appenders:
      - type: console
        timeZone: America/New_York
{% if LOGTOFILE == "true" %}
      - type: file
        timeZone: America/New_York
        currentLogFilename: {{ LOGPATH | d('/logs', true)}}/novelkms-access.log
        archivedLogFilenamePattern: {{ LOGPATH | d('/logs', true)}}/novelkms-access-%d.log.gz
        archivedFileCount: 14
{% endif %}

logging:
  level: DEBUG
  loggers:
    com.richardsand.novelkms: DEBUG
    org.eclipse.jetty: WARN
    org.apache.http: WARN
    timeZone: America/New_York
  appenders:
    - type: console
      timeZone: America/New_York
{% if LOGTOFILE == "true" %}
    - type: file
      timeZone: America/New_York
      currentLogFilename: {{ LOGPATH | d('/logs', true)}}/novelkms.log
      archivedLogFilenamePattern: {{ LOGPATH | d('/logs', true)}}/novelkms-%d.log.gz
      archivedFileCount: 14
{% endif %}
  
database:
  #url: jdbc:postgresql://localhost:5432/postgres
  #url: jdbc:h2:C:/dev/temp/novelkmsdb;MODE=PostgreSQL;AUTO_SERVER=TRUE
  url: {{DB_URL | d('jdbc:h2:C:/dev/temp/novelkmsdb;MODE=PostgreSQL;AUTO_SERVER=TRUE')}}
  adminUser: {{DB_USER | d('admin')}}
  adminPwd: {{DB_PASSWORD | d('admin123')}}

# Master key for encrypting secrets at rest (BYOK AI provider API keys).
# Set NOVELKMS_ENCRYPTION_KEY to a Base64-encoded 32-byte key in any real
# deployment. When left blank, an INSECURE development key is used and a
# warning is logged at startup — fine for local Eclipse runs, never for prod.
#   Generate one with:  openssl rand -base64 32
security:
  encryptionKey: {{NOVELKMS_ENCRYPTION_KEY | d('')}}

auth:
  publicBaseUrl: {{NOVELKMS_PUBLIC_BASE_URL | d('http://localhost:8080', true)}}
  frontendBaseUrl: {{NOVELKMS_FRONTEND_BASE_URL | d('http://localhost:3000', true)}}
  secureCookies: {{NOVELKMS_SECURE_COOKIES | d('false', true)}}
  sessionDays: 30

  google:
    clientId: {{GOOGLE_CLIENT_ID}}
    clientSecret: {{GOOGLE_CLIENT_SECRET}}
    authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
    tokenUrl: https://oauth2.googleapis.com/token
    userInfoUrl: https://openidconnect.googleapis.com/v1/userinfo
    scope: openid email profile

  github:
    clientId: {{GITHUB_CLIENT_ID}}
    clientSecret: {{GITHUB_CLIENT_SECRET}}
    authorizationUrl: https://github.com/login/oauth/authorize
    tokenUrl: https://github.com/login/oauth/access_token
    userInfoUrl: https://api.github.com/user
    scope: read:user user:email

  microsoft:
    clientId: {{MICROSOFT_CLIENT_ID}}
    clientSecret: {{MICROSOFT_CLIENT_SECRET}}
    tenant: ${MICROSOFT_TENANT:-common}
    authorizationUrl: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
    tokenUrl: https://login.microsoftonline.com/common/oauth2/v2.0/token
    userInfoUrl: https://login.microsoftonline.com/common/v2.0/.well-known/openid-configuration
    scope: openid email profile
