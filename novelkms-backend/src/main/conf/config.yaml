# ===========================================================================
# NovelKMS configuration
#
# Run with:   java -jar novelkms.jar server config.yaml
# Then open:  http://localhost:8080
#
# The H2 database file is created automatically next to wherever you launch
# the command from (the "./" below is relative to your current directory).
# ===========================================================================

server:
  # Mount the JAX-RS API under /api/* so the application root ("/") is free
  # for the bundled React app. The resource classes are mounted at "/", so
  # endpoints still resolve at /api/... (e.g. /api/books).
  rootPath: /api/*
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081
  requestLog:
    appenders:
      - type: console
#      - type: file
#        timeZone: America/New_York
#        currentLogFilename: /logs/novelkms-access.log
#        archivedLogFilenamePattern: /logs/novelkms-access-%d.log.gz
#        archivedFileCount: 14

logging:
  level: INFO
  loggers:
    com.richardsand.novelkms: INFO
    timeZone: America/New_York
  appenders:
    - type: console
#    - type: file
#      currentLogFilename: /logs/novelkms.log
#      archivedLogFilenamePattern: /logs/novelkms-%d.log.gz
#      archivedFileCount: 14
  
database:
  #url: jdbc:postgresql://localhost:5432/postgres
  adminUser: admin
  adminPwd: admin123
  url: jdbc:h2:C:/dev/temp/novelkmsdb;MODE=PostgreSQL;AUTO_SERVER=TRUE

auth:
  publicBaseUrl: http://localhost:8080
  frontendBaseUrl: http://localhost:3000
  secureCookies: false
  sessionDays: 30

  google:
    clientId: ${GOOGLE_CLIENT_ID}
    clientSecret: ${GOOGLE_CLIENT_SECRET}
    authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
    tokenUrl: https://oauth2.googleapis.com/token
    userInfoUrl: https://openidconnect.googleapis.com/v1/userinfo
    scope: openid email profile 
